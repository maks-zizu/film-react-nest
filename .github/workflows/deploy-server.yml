name: Deploy to Server

on:
  workflow_run:
    workflows:
      - Build and Publish Docker Images
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.head_branch == 'review-3' || github.event.workflow_run.head_branch == 'main')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check deploy secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "Missing required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY" >&2
            exit 1
          fi

      - name: Setup SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy containers on server
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            set -e
            cd ~/film-deploy
            docker compose pull frontend backend nginx
            docker compose up -d frontend backend nginx
            docker compose ps
          '
